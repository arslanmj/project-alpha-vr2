name: Enrichment Feed
on: [workflow_dispatch]

jobs:
  enrich:
    strategy:
      max-parallel: 3
      matrix:
        slot: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install cheerio axios
      - name: Run enrichment
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node enrichment-runner.js

  trigger-next:
    needs: enrich
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Wait then check remaining
        run: |
          sleep $((9 + RANDOM % 7))
          REMAINING=$(curl -s -H "x-api-key: ${{ secrets.API_KEY }}" ${{ secrets.API_BASE }}/enrichment-remaining | grep -o '"remaining":[0-9]*' | grep -o '[0-9]*')
          if [ "$REMAINING" -gt 0 ]; then
            curl -X POST -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/maintenance-feed.yml/dispatches \
              -d '{"ref":"main"}'
          fi
