name: Feed
on: [workflow_dispatch]

jobs:
  fetch:
    strategy:
      max-parallel: 3
      matrix:
        slot: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install cheerio axios
      - name: Run fetcher
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node runner.js
      - name: Trigger next Feed if remaining
        if: always()
        run: |
          REMAINING=$(curl -s -H "x-api-key: ${{ secrets.API_KEY }}" ${{ secrets.API_BASE }}/fetch-remaining | grep -o '"remaining":[0-9]*' | grep -o '[0-9]*')
          if [ "$REMAINING" -gt 0 ]; then
            curl -X POST -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/feed.yml/dispatches \
              -d '{"ref":"main"}'
          fi
