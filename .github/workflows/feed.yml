name: Feed
on: [workflow_dispatch]

jobs:
  fetch:
    strategy:
      max-parallel: 3
      matrix:
        slot: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install cheerio axios
      - name: Run fetcher
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node runner.js
